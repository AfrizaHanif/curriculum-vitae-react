name: Build & Deploy to Hostinger

on:
  workflow_dispatch: # Allows manual triggering of the workflow
    inputs:
      confirm_deployment:
        description: "Confirm deployment to Hostinger (This will put the site in maintenance mode temporarily)."
        required: true
        type: boolean
        default: false

jobs:
  build-and-deploy:
    if: github.event.inputs.confirm_deployment == 'true' # Only run if confirmation is true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Dynamically pick 'production' or 'staging' based on the branch
    environment:
      name: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && 'production' || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.9.0" # Next.js requires Node >= 20.9.0
          cache: "npm"

      - name: Check Environment Configuration
        run: |
          echo "Deploying to: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && 'production' || 'staging' }}"
          echo "Checking Variables (Publicly visible in logs if repo is public):"
          [ -n "${{ vars.NEXT_PUBLIC_BACKEND_URL }}" ] && echo "  ✓ NEXT_PUBLIC_BACKEND_URL is set" || echo "  ✗ NEXT_PUBLIC_BACKEND_URL is MISSING"
          [ -n "${{ vars.NEXT_PUBLIC_APP_URL }}" ] && echo "  ✓ NEXT_PUBLIC_APP_URL is set" || echo "  ✗ NEXT_PUBLIC_APP_URL is MISSING"
          [ -n "${{ vars.REMOTE_PATH }}" ] && echo "  ✓ REMOTE_PATH is set" || echo "  ✗ REMOTE_PATH is MISSING"

          echo "Checking Secrets (Confirmation only, no values printed):"
          [ -n "${{ secrets.FTP_HOST }}" ] && echo "  ✓ FTP_HOST is loaded" || echo "  ✗ FTP_HOST is MISSING"
          [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ] && echo "  ✓ SSH_PRIVATE_KEY is loaded" || echo "  ✗ SSH_PRIVATE_KEY is MISSING"
          [ -n "${{ secrets.FTP_PASSWORD }}" ] && echo "  ✓ FTP_PASSWORD is loaded" || echo "  ✗ FTP_PASSWORD is MISSING"
          [ -n "${{ secrets.HOSTINGER_DEPLOY_WEBHOOK_URL }}" ] && echo "  ✓ HOSTINGER_DEPLOY_WEBHOOK_URL is loaded" || echo "  ✗ HOSTINGER_DEPLOY_WEBHOOK_URL is MISSING"

      - name: Setup SSH Keys
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust Hostinger SSH Key
        env:
          SSH_HOST_KEY: ${{ secrets.SSH_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_HOST_KEY" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Cache dependencies and Next.js build cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next/cache
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm test || echo "No tests specified"

      - name: Build
        env:
          # Next.js inlines these values into the JS bundle here
          NEXT_PUBLIC_BACKEND_URL: ${{ vars.NEXT_PUBLIC_BACKEND_URL }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
        run: |
          # Generate version file to track which commit is live
          echo "{\"sha\": \"${{ github.sha }}\"}" > public/version.json
          npm run build

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Check SSH Key Status
        id: check_ssh_key
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_PORT: 65002
        run: |
          echo "Attempting a test SSH connection to verify key status..."
          # BatchMode prevents password prompts. We removed StrictHostKeyChecking=no because we trusted the key above.
          if ssh -o BatchMode=yes -o ConnectionAttempts=1 -p "$SFTP_PORT" "$FTP_USERNAME@$FTP_HOST" exit; then
            echo "SSH key is already working on the server."
            echo "ssh_key_working=true" >> "$GITHUB_OUTPUT"
          else
            echo "SSH key is NOT working or not authorized. Bootstrap needed."
            echo "ssh_key_working=false" >> "$GITHUB_OUTPUT"
          fi
        # Allow this step to fail without stopping the workflow, as its purpose is to determine if a fallback is needed.
        continue-on-error: true

      - name: Authorize SSH Key (Bootstrap)
        if: steps.check_ssh_key.outputs.ssh_key_working == 'false' # Only run if the SSH key check failed
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_PORT: 65002
        run: |
          echo "Restoring SSH Public Key to server using password..."
          # Extract public key from the private key secret
          echo "$SSH_PRIVATE_KEY" > temp_key
          chmod 600 temp_key
          ssh-keygen -y -f temp_key > id_rsa.pub

          # Use SFTP Password to ensure ~/.ssh exists and contains the key
          lftp -u "$FTP_USERNAME,$FTP_PASSWORD" sftp://$FTP_HOST:$SFTP_PORT -e "
            set sftp:auto-confirm yes;
            set net:timeout 10;
            set net:max-retries 1;
            mkdir -p .ssh;
            put id_rsa.pub -o .ssh/authorized_keys;
            chmod 700 .ssh;
            chmod 600 .ssh/authorized_keys;
            quit"
          rm temp_key id_rsa.pub
          echo "✓ SSH key restored and authorized"

      - name: Enable Maintenance Mode
        id: enable_maintenance
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_PORT: 65002
          MAINTENANCE_BYPASS_TOKEN: ${{ secrets.MAINTENANCE_BYPASS_TOKEN }}
        run: |
          echo "Attempting Enable Maintenance Mode via SSH Key (timeout 60s)..."
          # Inject secret into maintenance htaccess before uploading
          sed -i "s/BYPASS_TOKEN_PLACEHOLDER/$MAINTENANCE_BYPASS_TOKEN/g" public/.htaccess.maintenance
          timeout 60 lftp -u "$FTP_USERNAME," sftp://$FTP_HOST:$SFTP_PORT -e "
            set sftp:auto-confirm yes;
            set cmd:fail-exit on;
            set net:timeout 5; 
            set net:max-retries 1; 
            mkdir -p "${{ vars.REMOTE_PATH }}"; cd "${{ vars.REMOTE_PATH }}";
            put public/maintenance.html -o maintenance.html;
            put public/.htaccess.maintenance -o .htaccess;
            quit" || {
              echo "⚠️ SSH Key failed, falling back to SFTP Password..."
              timeout 300 lftp -u "$FTP_USERNAME,$FTP_PASSWORD" sftp://$FTP_HOST:$SFTP_PORT -e "
                set sftp:auto-confirm yes;
                set cmd:fail-exit on;
                set net:timeout 10; 
                set net:max-retries 2; 
                cd "${{ vars.REMOTE_PATH }}";
                put public/maintenance.html -o maintenance.html;
                put public/.htaccess.maintenance -o .htaccess;
                quit" || (echo "✗ Failed to enable maintenance mode even with password"; exit 1)
            }
          echo "✓ Maintenance mode enabled"

      - name: Push to Deployment Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out # The folder the action should deploy.
          branch: deploy # The branch the action should deploy to.
          clean: true # Automatically remove deleted files from the target branch
          single-commit: true # Keeps the deployment branch history clean

      - name: Remote Pull via Hostinger Webhook
        id: trigger_webhook
        if: success() # Only trigger if previous steps succeeded
        env:
          HOSTINGER_WEBHOOK_URL: ${{ secrets.HOSTINGER_DEPLOY_WEBHOOK_URL }}
        run: |
          echo "🛰️ Sending signal to Hostinger to pull 'deploy' branch..."
          curl -X POST "$HOSTINGER_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"ref": "refs/heads/deploy"}' || (echo "⚠️ Webhook trigger failed"; exit 1)

      - name: Verify Deployment (Smoke Test)
        id: smoke_test
        run: |
          echo "Waiting for Hostinger to complete the pull and verify server response..."
          MAX_RETRIES=12
          for i in $(seq 1 $MAX_RETRIES); do
            # Fetch version.json. -f fails on 4xx/5xx errors, -s is silent.
            RESPONSE=$(curl -s -f -H "X-Maintenance-Bypass: ${{ secrets.MAINTENANCE_BYPASS_TOKEN }}" "${{ vars.NEXT_PUBLIC_APP_URL }}/version.json") || RESPONSE=""
            
            # Use jq -e to check if the input is valid JSON and contains the .sha key
            if echo "$RESPONSE" | jq -e .sha >/dev/null 2>&1; then
              REMOTE_SHA=$(echo "$RESPONSE" | jq -r '.sha')
            else
              # If JSON is invalid or .sha is missing
              REMOTE_SHA="INVALID"
              echo "Attempt $i/$MAX_RETRIES: Server response was not valid JSON or version.json is missing."
            fi
            
            if [ "$REMOTE_SHA" == "${{ github.sha }}" ]; then
              echo "✓ Deployment verified! Remote SHA matches: $REMOTE_SHA"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES: Expected SHA ${{ github.sha }} but got '$REMOTE_SHA'. Retrying in 5s..."
            sleep 5
          done
          echo "✗ Server failed to respond correctly after 60 seconds."
          exit 1

      - name: Rollback - Disable Maintenance Mode on Failure
        if: failure() && steps.enable_maintenance.outcome == 'success'
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_PORT: 65002
        run: |
          echo "🚨 Deployment or Webhook failed! Rolling back maintenance mode to keep the old site live..."
          timeout 60 lftp -u "$FTP_USERNAME," sftp://$FTP_HOST:$SFTP_PORT -e "
            set sftp:auto-confirm yes;
            set cmd:fail-exit on;
            set net:timeout 5; 
            set net:max-retries 1; 
            mkdir -p "${{ vars.REMOTE_PATH }}"; cd "${{ vars.REMOTE_PATH }}";
            rm -f maintenance.html;
            put public/.htaccess -o .htaccess;
            quit" || {
              echo "⚠️ SSH Key failed, falling back to SFTP Password..."
              timeout 300 lftp -u "$FTP_USERNAME,$FTP_PASSWORD" sftp://$FTP_HOST:$SFTP_PORT -e "
                set sftp:auto-confirm yes;
                set cmd:fail-exit on;
                set net:timeout 10; 
                set net:max-retries 2; 
                cd "${{ vars.REMOTE_PATH }}";
                rm -f maintenance.html;
                put public/.htaccess -o .htaccess;
                quit" || (echo "✗ Failed to rollback maintenance mode"; exit 1)
            }
          echo "✓ Rollback complete - Site is back online (previous version)"

      - name: Disable Maintenance Mode
        if: success()
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_PORT: 65002
        run: |
          echo "Attempting Disable Maintenance Mode via SSH Key (timeout 60s)..."
          timeout 60 lftp -u "$FTP_USERNAME," sftp://$FTP_HOST:$SFTP_PORT -e "
            set sftp:auto-confirm yes;
            set cmd:fail-exit on;
            set net:timeout 5; 
            set net:max-retries 1; 
            mkdir -p "${{ vars.REMOTE_PATH }}"; cd "${{ vars.REMOTE_PATH }}";
            rm -f maintenance.html;
            put public/.htaccess -o .htaccess;
            quit" || {
              echo "⚠️ SSH Key failed, falling back to SFTP Password..."
              timeout 300 lftp -u "$FTP_USERNAME,$FTP_PASSWORD" sftp://$FTP_HOST:$SFTP_PORT -e "
                set sftp:auto-confirm yes;
                set cmd:fail-exit on;
                set net:timeout 10; 
                set net:max-retries 2; 
                cd "${{ vars.REMOTE_PATH }}";
                rm -f maintenance.html;
                put public/.htaccess -o .htaccess;
                quit" || (echo "✗ Failed to disable maintenance mode even with password"; exit 1)
            }
          echo "✓ Maintenance mode disabled - Site is live"
