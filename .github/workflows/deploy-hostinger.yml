name: Build & Deploy to Hostinger

on:
  workflow_dispatch: # Allows manual triggering of the workflow
    inputs:
      confirm_deployment:
        description: "Confirm deployment to Hostinger (This will put the site in maintenance mode temporarily)."
        required: true
        type: boolean
        default: false
      force_reset:
        description: "Perform a clean sync? (Deletes old Next.js files, but ALWAYS preserves subdomain folders like /api)"
        required: true
        type: boolean
        default: false

jobs:
  build-and-deploy:
    if: github.event.inputs.confirm_deployment == 'true' # Only run if confirmation is true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Dynamically pick 'production' or 'staging' based on the branch
    environment:
      name: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && 'production' || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.9.0" # Next.js requires Node >= 20.9.0
          cache: "npm"

      - name: Check Environment Configuration
        run: |
          echo "Deploying to: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && 'production' || 'staging' }}"
          echo "Checking Variables (Publicly visible in logs if repo is public):"
          [ -n "${{ vars.NEXT_PUBLIC_BACKEND_URL }}" ] && echo "  ✓ NEXT_PUBLIC_BACKEND_URL is set" || echo "  ✗ NEXT_PUBLIC_BACKEND_URL is MISSING"
          [ -n "${{ vars.NEXT_PUBLIC_APP_URL }}" ] && echo "  ✓ NEXT_PUBLIC_APP_URL is set" || echo "  ✗ NEXT_PUBLIC_APP_URL is MISSING"
          [ -n "${{ vars.REMOTE_PATH }}" ] && echo "  ✓ REMOTE_PATH is set" || echo "  ✗ REMOTE_PATH is MISSING"

          echo "Checking Secrets (Confirmation only, no values printed):"
          [ -n "${{ secrets.FTP_HOST }}" ] && echo "  ✓ FTP_HOST is loaded" || echo "  ✗ FTP_HOST is MISSING"
          [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ] && echo "  ✓ SSH_PRIVATE_KEY is loaded" || echo "  ✗ SSH_PRIVATE_KEY is MISSING"
          [ -n "${{ secrets.FTP_PASSWORD }}" ] && echo "  ✓ FTP_PASSWORD is loaded" || echo "  ✗ FTP_PASSWORD is MISSING"
          [ -n "${{ secrets.FTP_USERNAME }}" ] && echo "  ✓ FTP_USERNAME is loaded" || echo "  ✗ FTP_USERNAME is MISSING"
          [ -n "${{ secrets.SSH_HOST_KEY }}" ] && echo "  ✓ SSH_HOST_KEY is loaded" || echo "  ✗ SSH_HOST_KEY is MISSING"
          [ -n "${{ secrets.MAINTENANCE_BYPASS_TOKEN }}" ] && echo "  ✓ MAINTENANCE_BYPASS_TOKEN is loaded" || echo "  ✗ MAINTENANCE_BYPASS_TOKEN is MISSING"

      - name: Setup SSH Keys
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust Hostinger SSH Key
        env:
          SSH_HOST_KEY: ${{ secrets.SSH_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_HOST_KEY" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          # Key includes the lockfile and a hash of all source files to allow incremental updates
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        # --prefer-offline uses the ~/.npm cache provided by setup-node@v4
        run: npm ci --prefer-offline

      - name: "Diagnostic: Test API Connectivity"
        run: |
          echo "Testing connection to API..."
          curl -I -m 10 ${{ vars.NEXT_PUBLIC_BACKEND_URL }}/api/blogs || echo "⚠️ API is unreachable via curl"
          nslookup api.afrizahanif.com || echo "⚠️ DNS resolution failed"

      - name: Run Tests
        run: npm test || echo "No tests specified"

      - name: Build
        env:
          # Next.js inlines these values into the JS bundle here
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_BACKEND_URL: ${{ vars.NEXT_PUBLIC_BACKEND_URL }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
        run: |
          # Generate version file to track which commit is live
          echo "{\"sha\": \"${{ github.sha }}\"}" > public/version.json
          npm run build

      - name: Verify Inlined Environment Variables
        run: |
          echo "🔍 Searching for inlined variables in 'out/' directory..."
          # Check for Backend URL
          grep -r "${{ vars.NEXT_PUBLIC_BACKEND_URL }}" out/_next/static/chunks/ || (echo "❌ Error: NEXT_PUBLIC_BACKEND_URL not found in JS chunks!"; exit 1)
          # Check for App URL
          grep -r "${{ vars.NEXT_PUBLIC_APP_URL }}" out/_next/static/chunks/ || (echo "❌ Error: NEXT_PUBLIC_APP_URL not found in JS chunks!"; exit 1)
          echo "✓ Success: Variables found in build output."

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Force Reset (Clean Sync)
        if: github.event.inputs.force_reset == 'true'
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_PORT: 65002
          PROJECT_ROOT: ${{ vars.REMOTE_PATH }}
        run: |
          echo "⚠️ Zero-Downtime Force Reset requested..."
          ssh -o StrictHostKeyChecking=no -p "$SFTP_PORT" "$FTP_USERNAME@$FTP_HOST" "
            cd $PROJECT_ROOT && \
            # Find the path currently pointed to by the symlink
            CURRENT_VAL=\$(readlink current) && \
            # Delete everything in releases except the currently active one
            find releases/* -maxdepth 0 ! -path \"\$CURRENT_VAL\" -exec rm -rf {} +
          "
          echo "✓ Non-active releases cleared. Active release preserved for zero-downtime."

      - name: Upload Release via lftp
        id: deploy_files
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_PORT: 65002
          RELEASE_PATH: "${{ vars.REMOTE_PATH }}/releases/${{ github.run_id }}"
        run: |
          echo "Creating release directory: $RELEASE_PATH"
          timeout 600 lftp -u "$FTP_USERNAME," sftp://$FTP_HOST:$SFTP_PORT -e "
            set sftp:auto-confirm yes;
            set cmd:fail-exit on;
            set net:timeout 15;
            set net:max-retries 3;
            mkdir -p $RELEASE_PATH;
            mirror -R --verbose=3 --parallel=10 out/ $RELEASE_PATH;
            quit" || {
              echo "⚠️ SSH Key failed, falling back to SFTP Password..."
              timeout 1200 lftp -u "$FTP_USERNAME,$FTP_PASSWORD" sftp://$FTP_HOST:$SFTP_PORT -e "
                set sftp:auto-confirm yes;
                set cmd:fail-exit on;
                set net:timeout 30;
                set net:max-retries 5;
                mkdir -p $RELEASE_PATH;
                mirror -R --verbose=3 --parallel=10 out/ $RELEASE_PATH;
                quit" || (echo "✗ Sync failed even with password"; exit 1)
            }
          echo "✓ Files uploaded to release folder"

      - name: Atomic Switch (Update Symlink)
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_PORT: 65002
          PROJECT_ROOT: ${{ vars.REMOTE_PATH }}
          RELEASE_ID: ${{ github.run_id }}
        run: |
          ssh -o StrictHostKeyChecking=no -p "$SFTP_PORT" "$FTP_USERNAME@$FTP_HOST" "
            cd $PROJECT_ROOT && \
            # Symlink protected subdirectories into the new release
            [ -d api ] && ln -sfn ../../api releases/$RELEASE_ID/api; \
            [ -d staging-api ] && ln -sfn ../../staging-api releases/$RELEASE_ID/staging-api; \
            # Atomic switch: link 'current' to the new release
            ln -sfn releases/$RELEASE_ID current
          "
          echo "✓ Atomic switch complete: 'current' now points to release $RELEASE_ID"

      - name: Verify Deployment (Smoke Test)
        id: smoke_test
        run: |
          echo "Waiting for Hostinger to complete the pull and verify server response..."
          MAX_RETRIES=12
          for i in $(seq 1 $MAX_RETRIES); do
            # Fetch version.json. -f fails on 4xx/5xx errors, -s is silent.
            RESPONSE=$(curl -s -f -H "X-Maintenance-Bypass: ${{ secrets.MAINTENANCE_BYPASS_TOKEN }}" "${{ vars.NEXT_PUBLIC_APP_URL }}/version.json") || RESPONSE=""
            
            # Use jq -e to check if the input is valid JSON and contains the .sha key
            if echo "$RESPONSE" | jq -e .sha >/dev/null 2>&1; then
              REMOTE_SHA=$(echo "$RESPONSE" | jq -r '.sha')
            else
              # If JSON is invalid or .sha is missing
              REMOTE_SHA="INVALID"
              echo "Attempt $i/$MAX_RETRIES: Server response was not valid JSON or version.json is missing."
            fi
            
            if [ "$REMOTE_SHA" == "${{ github.sha }}" ]; then
              echo "✓ Deployment verified! Remote SHA matches: $REMOTE_SHA"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES: Expected SHA ${{ github.sha }} but got '$REMOTE_SHA'. Retrying in 5s..."
            sleep 5
          done
          echo "✗ Server failed to respond correctly after 60 seconds."
          exit 1

      - name: Rollback on Failure
        if: failure() && steps.deploy_files.outcome == 'success'
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_PORT: 65002
          PROJECT_ROOT: ${{ vars.REMOTE_PATH }}
        run: |
          echo "🚨 Deployment failed! Attempting to revert symlink to previous release..."
          ssh -o StrictHostKeyChecking=no -p "$SFTP_PORT" "$FTP_USERNAME@$FTP_HOST" "
            cd $PROJECT_ROOT && \
            # Point back to the second most recent release (the previous live one)
            PREV_RELEASE=\$(ls -dt releases/* | sed -n '2p')
            if [ -n \"\$PREV_RELEASE\" ]; then
              ln -sfn \$PREV_RELEASE current
              echo \"Reverted to \$PREV_RELEASE\"
            fi
          "

      - name: Clean Up Old Releases
        if: success()
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_PORT: 65002
          PROJECT_ROOT: ${{ vars.REMOTE_PATH }}
        run: |
          echo "Automating cleanup of old releases (keeping last 3 for safety)..."
          ssh -o StrictHostKeyChecking=no -p "$SFTP_PORT" "$FTP_USERNAME@$FTP_HOST" "
            if [ -d \"$PROJECT_ROOT/releases\" ]; then
              cd \"$PROJECT_ROOT/releases\" && \
              # List directories by time (oldest first), exclude the last 3, and delete them
              ls -1tr | head -n -3 | xargs -r rm -rf --
            else
              echo 'Releases directory not found, skipping cleanup.'
            fi
          "
          echo "✓ Old releases cleaned up."
