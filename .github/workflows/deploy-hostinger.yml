name: Build & Deploy to Hostinger

on:
  push:
    branches: [main, master, staging]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Dynamically pick 'production' or 'staging' based on the branch
    environment:
      name: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && 'production' || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.9.0" # Next.js requires Node >= 20.9.0
          cache: "npm"

      - name: Check Environment Configuration
        run: |
          echo "Deploying to: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && 'production' || 'staging' }}"
          echo "Checking Variables (Publicly visible in logs if repo is public):"
          [ -n "${{ vars.NEXT_PUBLIC_BACKEND_URL }}" ] && echo "  ✓ NEXT_PUBLIC_BACKEND_URL is set" || echo "  ✗ NEXT_PUBLIC_BACKEND_URL is MISSING"
          [ -n "${{ vars.NEXT_PUBLIC_APP_URL }}" ] && echo "  ✓ NEXT_PUBLIC_APP_URL is set" || echo "  ✗ NEXT_PUBLIC_APP_URL is MISSING"
          [ -n "${{ vars.REMOTE_PATH }}" ] && echo "  ✓ REMOTE_PATH is set" || echo "  ✗ REMOTE_PATH is MISSING"

          echo "Checking Secrets (Confirmation only, no values printed):"
          [ -n "${{ secrets.FTP_HOST }}" ] && echo "  ✓ FTP_HOST is loaded" || echo "  ✗ FTP_HOST is MISSING"
          [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ] && echo "  ✓ SSH_PRIVATE_KEY is loaded" || echo "  ✗ SSH_PRIVATE_KEY is MISSING"
          [ -n "${{ secrets.FTP_PASSWORD }}" ] && echo "  ✓ FTP_PASSWORD is loaded" || echo "  ✗ FTP_PASSWORD is MISSING"

      - name: Setup SSH Keys
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Cache dependencies and Next.js build cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next/cache
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Enable Maintenance Mode
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_PORT: 65002
        run: |
          echo "Attempting Enable Maintenance Mode via SSH Key..."
          timeout 300 lftp -u "$FTP_USERNAME," sftp://$FTP_HOST:$SFTP_PORT -e "
            set sftp:auto-confirm yes;
            set cmd:fail-exit on;
            set net:timeout 10; 
            set net:max-retries 2; 
            cd "${{ vars.REMOTE_PATH }}";
            put public/maintenance.html -o maintenance.html;
            put public/.htaccess.maintenance -o .htaccess;
            quit" || {
              echo "⚠️ SSH Key failed, falling back to SFTP Password..."
              timeout 300 lftp -u "$FTP_USERNAME,$FTP_PASSWORD" sftp://$FTP_HOST:$SFTP_PORT -e "
                set sftp:auto-confirm yes;
                set cmd:fail-exit on;
                set net:timeout 10; 
                set net:max-retries 2; 
                cd "${{ vars.REMOTE_PATH }}";
                put public/maintenance.html -o maintenance.html;
                put public/.htaccess.maintenance -o .htaccess;
                quit" || (echo "✗ Failed to enable maintenance mode even with password"; exit 1)
            }
          echo "✓ Maintenance mode enabled"

      - name: Build
        env:
          # Next.js inlines these values into the JS bundle here
          NEXT_PUBLIC_BACKEND_URL: ${{ vars.NEXT_PUBLIC_BACKEND_URL }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          # NEXT_PUBLIC_ANALYTICS_ID: ${{ secrets.ANALYTICS_ID }}
        run: npm run build

      - name: Push to Deployment Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out # The folder the action should deploy.
          branch: deploy # The branch the action should deploy to.
          clean: true # Automatically remove deleted files from the target branch
          single-commit: true # Keeps the deployment branch history clean

      - name: Remote Pull via Hostinger Webhook
        if: success() # Only trigger if previous steps succeeded
        env:
          HOSTINGER_WEBHOOK_URL: ${{ secrets.HOSTINGER_DEPLOY_WEBHOOK_URL }}
        run: |
          echo "🛰️ Sending signal to Hostinger to pull 'deploy' branch..."
          curl -X POST "$HOSTINGER_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"ref": "refs/heads/deploy"}' || (echo "⚠️ Webhook trigger failed"; exit 1)
          sleep 5 # Give Hostinger a few seconds to process the pull

      - name: Disable Maintenance Mode
        if: success()
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_PORT: 65002
        run: |
          echo "Attempting Disable Maintenance Mode via SSH Key..."
          timeout 300 lftp -u "$FTP_USERNAME," sftp://$FTP_HOST:$SFTP_PORT -e "
            set sftp:auto-confirm yes;
            set cmd:fail-exit on;
            set net:timeout 10; 
            set net:max-retries 2; 
            cd "${{ vars.REMOTE_PATH }}";
            rm -f maintenance.html;
            put public/.htaccess -o .htaccess;
            quit" || {
              echo "⚠️ SSH Key failed, falling back to SFTP Password..."
              timeout 300 lftp -u "$FTP_USERNAME,$FTP_PASSWORD" sftp://$FTP_HOST:$SFTP_PORT -e "
                set sftp:auto-confirm yes;
                set cmd:fail-exit on;
                set net:timeout 10; 
                set net:max-retries 2; 
                cd "${{ vars.REMOTE_PATH }}";
                rm -f maintenance.html;
                put public/.htaccess -o .htaccess;
                quit" || (echo "✗ Failed to disable maintenance mode even with password"; exit 1)
            }
          echo "✓ Maintenance mode disabled - Site is live"
